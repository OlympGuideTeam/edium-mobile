name: Android → RuStore

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Что изменилось"
        required: false
        default: "CI build"

jobs:
  deploy:
    name: Build & Upload to RuStore
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Исходники ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java (нужно для Android) ─────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Flutter ─────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: edium
        run: flutter pub get

      # ── Подпись Android ─────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Create key.properties
        run: |
          cat <<EOF > edium/android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../../keystore.jks
          EOF

      # ── Сборка ───────────────────────────────────────────────
      - name: Build APK
        working-directory: edium
        run: flutter build apk --release --build-number ${{ github.run_number }}

      # (рекомендую AAB, но RuStore принимает APK тоже)
      # flutter build appbundle

      # ── Установка Fastlane ──────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: edium

      # ── Деплой в RuStore ────────────────────────────────────
      - name: Upload to RuStore
        working-directory: edium
        env:
          RUSTORE_KEY_ID: ${{ secrets.RUSTORE_KEY_ID }}
          RUSTORE_PRIVATE_KEY_BASE64: ${{ secrets.RUSTORE_PRIVATE_KEY_BASE64 }}
        run: bundle exec fastlane android beta

      # ── Артефакт ────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: edium/build/app/outputs/flutter-apk/app-release.apk