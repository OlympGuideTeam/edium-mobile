name: iOS → TestFlight

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Что изменилось в этой сборке (для тестировщиков)"
        required: false
        default: "Внутренняя сборка"

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ── Исходники ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Flutter ────────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: edium
        run: flutter pub get

      # ── Ruby / Fastlane ────────────────────────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-version: latest
          bundler-cache: true          # кэширует gems по Gemfile.lock
          working-directory: edium

      # ── Подпись: сертификат ────────────────────────────────────────────────
      - name: Import distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH"

      # ── CocoaPods + Flutter build ──────────────────────────────────────────
      # flutter build ios запускается здесь (не внутри fastlane), чтобы pod
      # нашёлся через прямой PATH, а не через bundle exec окружение.
      - name: Reinstall CocoaPods
        run: gem install cocoapods --no-document

      - name: Pod install
        working-directory: edium/ios
        run: pod install

      - name: Flutter build iOS (no codesign)
        working-directory: edium
        run: flutter build ios --release --no-codesign

      # ── Подпись + загрузка через Fastlane ─────────────────────────────────
      - name: Sign & upload via Fastlane
        working-directory: edium
        env:
          APPLE_TEAM_ID:                    ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: bundle exec fastlane ios beta

      # ── Артефакты (опционально) ────────────────────────────────────────────
      - name: Upload IPA as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Edium-${{ github.run_number }}.ipa
          path: edium/build/ios/ipa/Edium.ipa
          retention-days: 7

      # ── Cleanup ────────────────────────────────────────────────────────────
      - name: Delete keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
