name: edium
description: "Образовательная платформа Edium"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Network
  dio: ^5.9.0
  dio_refresh: ^1.0.0
  # DI
  get_it: ^7.2.0
  # Storage
  flutter_secure_storage: ^8.0.0
  shared_preferences: ^2.3.3
  hive_flutter: ^1.1.0
  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  # Navigation
  go_router: ^14.3.0
  # Code generation annotations (runtime)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # Internationalisation
  intl: ^0.19.0
  # URL launcher
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_e.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
