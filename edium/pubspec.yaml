name: edium
description: "Образовательная платформа Edium"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Network
  dio: ^5.9.0
  dio_refresh: ^1.0.0
  # DI
  get_it: ^7.2.0
  # Storage
  flutter_secure_storage: ^8.0.0
  shared_preferences: ^2.3.3
  hive_flutter: ^1.1.0
  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  # Navigation
  go_router: ^14.3.0
  # Code generation annotations (runtime)
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  # Internationalisation
  intl: ^0.20.2
  # URL launcher
  url_launcher: ^6.2.0
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.3.3
  webview_flutter_wkwebview: ^3.18.4
  # Export & share
  excel: ^4.0.6
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  # Deep links
  app_links: ^6.4.0
  # Push notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  # Screen protection
  no_screenshot: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_e.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
